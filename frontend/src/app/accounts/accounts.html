<div class="container">
  <div class="card">
    <div class="card-header">Gestion des Comptes</div>
    <div class="card-body">
      <form [formGroup]="accountFormGroup" (ngSubmit)="handleSearchAccount()">
        <div class="input-group mb-3">
          <label class="input-group-text">Account ID</label>
          <input type="text" formControlName="accountId" class="form-control">
          <button class="btn btn-info" type="submit">
            <i class="bi bi-search"></i> Chercher
          </button>
        </div>
      </form>
      <div class="row">

        <div class="col-md-6">
          <div *ngIf="account$ | async as accountDetails">

            <div class="mb-3">
              <div class="d-flex justify-content-between p-2 bg-light">
                <label>Account ID :</label>
                <strong>{{ accountDetails.accountId }}</strong>
              </div>
              <div class="d-flex justify-content-between p-2">
                <label>Balance :</label>
                <strong>{{ accountDetails.balance | number:'1.2-2' }}</strong>
              </div>
            </div>
            <table class="table table-bordered table-striped">
              <thead class="table-dark">
              <tr>
                <th>ID</th>
                <th>Date</th>
                <th>Type</th>
                <th class="text-end">Montant</th>
              </tr>
              </thead>
              <tbody>
              <tr *ngFor="let op of accountDetails.accountOperationDTOS">
                <td>{{ op.id }}</td>
                <td>{{ op.operationDate | date:'dd/MM/yyyy HH:mm' }}</td>
                <td>{{ op.type }}</td>
                <td class="text-end">{{ op.amount | number:'1.2-2' }}</td>
              </tr>
              </tbody>
            </table>

            <ul class="nav">
              <li *ngFor="let item of [].constructor(accountDetails.totalPages); let page = index"
                  class="nav-item ms-1 mt-1">
                <button (click)="gotoPage(page)"
                        [ngClass]="page == currentPage ? 'btn btn-info' : 'btn btn-outline-info'">
                  {{ page }}
                </button>
              </li>
            </ul>
          </div>

          <div *ngIf="errorMessage" class="text-danger mt-2">
            {{ errorMessage }}
          </div>
        </div>
        <div class="col-md-6">
          <div *ngIf="account$ | async" class="card">
            <div class="card-header">Nouvelle Opération</div>
            <div class="card-body">
              <form [formGroup]="operationFormGroup" (ngSubmit)="handleSaveOperation()">
                <div class="mb-3">
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio"
                           formControlName="operationType" value="DEBIT">
                    <label class="form-check-label">Débit</label>
                  </div>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio"
                           formControlName="operationType" value="CREDIT">
                    <label class="form-check-label">Crédit</label>
                  </div>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio"
                           formControlName="operationType" value="TRANSFER">
                    <label class="form-check-label">Virement</label>
                  </div>
                </div>
                <div class="mb-3">
                  <label class="form-label">Montant</label>
                  <input type="number" formControlName="amount" class="form-control">
                </div>
                <div class="mb-3">
                  <label class="form-label">Description</label>
                  <input type="text" formControlName="description" class="form-control">
                </div>
                <div class="mb-3"
                     *ngIf="operationFormGroup.value.operationType === 'TRANSFER'">
                  <label class="form-label">Compte Destination</label>
                  <input type="text" formControlName="accountDestination" class="form-control">
                </div>
                <button type="submit" class="btn btn-success w-100">
                  Valider l'opération
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
